<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Social Buttons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="row">
        <div class="icon-box inset"><i class="fa-brands fa-facebook-f" style="color: #3b5998;"></i></div>
        <div class="icon-box inset"><i class="fa-brands fa-twitter" style="color: #00acee;"></i></div>
        <div class="icon-box inset"><i class="fa-brands fa-instagram" style="color: #e4405f;"></i></div>
        <div class="icon-box inset"><i class="fa-brands fa-linkedin-in" style="color: #0e76a8;"></i></div>
        <div class="icon-box inset"><i class="fa-brands fa-github" style="color: #333;"></i></div>
    </div>

    <div class="row">
        <div class="icon-box ring"><i class="fa-brands fa-facebook-f" style="color: #3b5998;"></i></div>
        <div class="icon-box ring"><i class="fa-brands fa-twitter" style="color: #00acee;"></i></div>
        <div class="icon-box ring"><i class="fa-brands fa-instagram" style="color: #e4405f;"></i></div>
        <div class="icon-box ring"><i class="fa-brands fa-linkedin-in" style="color: #0e76a8;"></i></div>
        <div class="icon-box ring active"><i class="fa-brands fa-github" style="color: #333;"></i></div>
    </div>

</body>
</html>
